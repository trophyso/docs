# Top level styles
StylesPath = styles
MinAlertLevel = suggestion
IgnoredScopes = code, tt, img, url, a, em, strong, code
SkippedScopes = script, style, pre, figure, code

# Vocabularies
Vocab = Mintlify, Trophy

# This is required since Vale doesn't officially support MDX
[formats]
mdx = md

# MDX support
[*.mdx]
BasedOnStyles = Vale
Vale.Terms = NO # Enforces really harsh capitalization rules, keep off

# Exclude Spanish locale pages from spellchecking.
# Vale may evaluate paths with leading directories, so match both forms.
[es/**/*.mdx]
Vale.Spelling = NO
[**/es/**/*.mdx]
Vale.Spelling = NO

# `import ...`, `export ...`
# `<Component ... />`
# `<Component>...</Component>`
# `{ ... }`
TokenIgnores = (?sm)((?:import|export) .+?$), \
(?<!`)(<\w+ ?.+ ?\/>)(?!`), \
(<[A-Z]\w+>.+?<\/[A-Z]\w+>)

# Exclude:
# `<Component \n ... />`
BlockIgnores = (?sm)^(<\w+\n .*\s\/>)$, \
(?sm)^({.+.*})

CommentDelimiters = {/*, */}